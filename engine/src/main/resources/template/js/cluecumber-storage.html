<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title></title>
</head>
<body>
<script>
    (function () {
        var STORAGE_KEY = 'darkMode';
        var LEGACY_STORAGE_KEY = 'cluecumber-dark-mode';

        function readTheme() {
            var value = localStorage.getItem(STORAGE_KEY);
            if (value === null) {
                var legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
                if (legacy === 'enabled' || legacy === 'disabled') {
                    localStorage.setItem(STORAGE_KEY, legacy);
                    value = legacy;
                }
            }
            if (value === 'enabled') {
                return 'dark';
            }
            if (value === 'disabled') {
                return 'light';
            }
            return null;
        }

        window.addEventListener('message', function (event) {
            var data = event.data;
            if (!data || typeof data.type !== 'string') {
                return;
            }

            var source = event.source;
            if (!source) {
                return;
            }

            if (data.type === 'cluecumber-get-theme') {
                source.postMessage({
                    type: 'cluecumber-theme',
                    theme: readTheme()
                }, '*');
            }

            if (data.type === 'cluecumber-set-theme') {
                localStorage.setItem(STORAGE_KEY, data.theme === 'dark' ? 'enabled' : 'disabled');
                localStorage.removeItem(LEGACY_STORAGE_KEY);
                source.postMessage({
                    type: 'cluecumber-theme',
                    theme: data.theme
                }, '*');
            }
        });
    })();
</script>
</body>
</html>
