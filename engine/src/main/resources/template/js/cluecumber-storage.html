<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title></title>
</head>
<body>
<script>
    (function () {
        var STORAGE_KEY = 'darkMode';

        window.addEventListener('message', function (event) {
            var data = event.data;
            if (!data || typeof data.type !== 'string' || data.type.indexOf('cluecumber-') !== 0) {
                return;
            }

            var source = event.source;
            if (!source) {
                return;
            }

            if (data.type === 'cluecumber-get-theme') {
                source.postMessage({
                    type: 'cluecumber-theme',
                    dark: localStorage.getItem(STORAGE_KEY) === 'enabled'
                }, '*');
            }

            if (data.type === 'cluecumber-set-theme') {
                localStorage.setItem(STORAGE_KEY, data.dark ? 'enabled' : 'disabled');
                source.postMessage({
                    type: 'cluecumber-theme',
                    dark: data.dark
                }, '*');
            }
        });
    })();
</script>
</body>
</html>
